<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>회원목록</title>
</head>
<body>
    <div layout:fragment="content">
        <div th:replace="~{admin/common/adminNav :: adminNav}"></div>

        <div class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>👥 전체 회원 목록</h2>
                <div>
                    <button type="button" class="btn btn-warning btn-sm me-2" onclick="sendAllNotification()">📢 전체 알림 보내기</button>
                    <a th:href="@{/admin/users/add}" class="btn btn-success btn-sm">+ 회원 추가</a>
                </div>
            </div>

            <div class="card p-3 shadow-sm">
                <table class="table table-hover table-bordered bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>번호</th>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>관리자 여부</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user, status : ${users}">
                            <td th:text="${status.index + 1}">1</td>
                            <td th:text="${user.id}">id</td>
                            <td th:text="${user.name}">name</td>
                            <td th:text="${user.email}">email</td>
                            <td th:text="${user.admin ? '✔' : '✖'}">✖</td>
                            <td class="text-center">
                                <button type="button" class="btn btn-sm btn-info text-white" 
                                        th:data-user-id="${user.id}"
                                        onclick="sendUserNotification(this.getAttribute('data-user-id'))">🔔 알림</button>
                                <a th:href="@{/admin/users/edit/{no}(no=${user.memberNo})}" class="btn btn-sm btn-outline-primary">수정</a>
                                <a th:href="@{/admin/users/delete/{no}(no=${user.memberNo})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            function sendAllNotification() {
                const message = prompt("전체 회원에게 보낼 알림 내용을 입력하세요.");
                if (message) {
                    fetch('/notification/send/all', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'message=' + encodeURIComponent(message)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) alert(data.message);
                        else alert("실패: " + data.message);
                    });
                }
            }

            function sendUserNotification(userId) {
                const message = prompt(userId + "님에게 보낼 알림 내용을 입력하세요.");
                if (message) {
                    fetch('/notification/send/user', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'userId=' + encodeURIComponent(userId) + '&message=' + encodeURIComponent(message)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) alert(data.message);
                        else alert("실패: " + data.message);
                    });
                }
            }
        </script>
    </div>
</body>
</html>
