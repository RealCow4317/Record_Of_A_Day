<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>캘린더</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <link th:href="@{/css/calendar.css}" rel="stylesheet">
</head>
<body>
    <div layout:fragment="content">
        <div id="calendar-container" class="container mt-5">
            <div id='calendar'></div>
        </div>

        <div class="modal fade" id="diaryModal" tabindex="-1" aria-labelledby="diaryModalLabel">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form id="diaryForm" th:action="@{/calendar/diary}" method="post" enctype="multipart/form-data">
                        <div class="modal-header">
                            <h5 class="modal-title" id="diaryModalLabel">오늘의 일기 작성</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="diaryDate" id="modalDiaryDate">
                            <div class="mb-3" id="existingImagePreviewContainer" style="display: none;">
                                <label class="form-label">기존 이미지:</label>
                                <img id="existingImagePreview" src="" alt="Existing Image" class="img-fluid mb-2">
                                <small class="form-text text-muted">새로운 이미지를 업로드하면 기존 이미지가 교체됩니다.</small>
                            </div>
                            <div class="mb-3">
                                <label for="diaryContent" class="form-label">한 줄 일기:</label>
                                <input type="text" class="form-control" id="diaryContent" name="content">
                            </div>
                            <div class="mb-3">
                                <label for="diaryImage" class="form-label">사진 업로드:</label>
                                <input type="file" class="form-control" id="diaryImage" name="imageFile" accept="image/*">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-danger" id="btnDeleteDiary" style="display: none;">삭제</button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                            <button type="submit" id="saveDiaryBtn" class="btn btn-primary">저장</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
        <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ko.js'></script>

        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function() {
                // contextPath 안전하게 처리
                let rawContextPath = /*[[@{/}]]*/ '';
                const contextPath = rawContextPath.endsWith('/') ? rawContextPath : rawContextPath + '/';
                
                const diaryForm = document.getElementById('diaryForm');
                const btnDeleteDiary = document.getElementById('btnDeleteDiary');
                const saveDiaryBtn = document.getElementById('saveDiaryBtn');
                
                // 저장 버튼 클릭 시 폼 검증
                saveDiaryBtn.addEventListener('click', function(e) {
                    const contentInput = document.getElementById('diaryContent');
                    const imageInput = document.getElementById('diaryImage');
                    const existingImage = document.getElementById('existingImagePreview').getAttribute('src');
                    
                    const hasContent = contentInput.value.trim().length > 0;
                    const hasNewImage = imageInput.files.length > 0;
                    const hasExistingImage = existingImage && existingImage !== '' && !existingImage.endsWith('null');
                    const hasImage = hasNewImage || hasExistingImage;
                    
                    if (!hasContent && !hasImage) {
                         alert('내용이나 이미지를 입력해주세요.');
                         return;
                    }

                    let confirmMsg = '';
                    if (!hasContent && hasImage) {
                        confirmMsg = '글을 작성하지 않으셨습니다. 그대로 업로드 하시겠습니까?';
                    } else if (hasContent && !hasImage) {
                        confirmMsg = '사진을 첨부하지 않았습니다. 그대로 업로드 하시겠습니까?';
                    }

                    if (!confirmMsg || confirm(confirmMsg)) {
                        diaryForm.submit();
                    }
                });

                // 삭제 버튼 처리
                btnDeleteDiary.addEventListener('click', function() {
                    const date = document.getElementById('modalDiaryDate').value;
                    if (confirm(date + ' 일기를 삭제하시겠습니까?')) {
                        const formData = new FormData();
                        formData.append('date', date);

                        fetch(contextPath + 'calendar/delete-diary', {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => {
                            if (response.ok) {
                                if (document.activeElement) document.activeElement.blur();
                                const modalInstance = bootstrap.Modal.getInstance(document.getElementById('diaryModal'));
                                if (modalInstance) modalInstance.hide();
                                
                                // 배경 이미지 즉시 제거 로직 추가
                                const dayEl = document.querySelector(`.fc-daygrid-day[data-date="${date}"]`);
                                if (dayEl) {
                                    dayEl.style.backgroundImage = '';
                                    dayEl.classList.remove('diary-with-image');
                                    const frame = dayEl.querySelector('.fc-daygrid-day-frame');
                                    if (frame) frame.style.backgroundColor = '';
                                    const dayTop = dayEl.querySelector('.fc-daygrid-day-top');
                                    if (dayTop) {
                                        dayTop.style.backgroundColor = '';
                                        dayTop.style.borderRadius = '';
                                    }
                                }
                                
                                calendar.refetchEvents();
                            } else {
                                alert('삭제에 실패했습니다.');
                            }
                        })
                        .catch(error => {
                            console.error('Error:', error);
                            alert('오류가 발생했습니다.');
                        });
                    }
                });
                
                var calendarEl = document.getElementById('calendar');
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'ko',
                    height: 'auto',
                    dayMaxEvents: true,
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth'
                    },
                    dateClick: function(info) {
                        const clickedDate = new Date(info.dateStr);
                        clickedDate.setHours(0, 0, 0, 0);
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);

                        if (clickedDate.getTime() <= today.getTime()) {
                            document.getElementById('diaryForm').reset();
                            document.getElementById('existingImagePreviewContainer').style.display = 'none';
                            document.getElementById('existingImagePreview').src = '';

                            fetch(contextPath + 'calendar/diary-entry?date=' + info.dateStr)
                                .then(response => {
                                    if (response.ok && response.status !== 204) {
                                        return response.text().then(text => text ? JSON.parse(text) : null);
                                    }
                                    return null;
                                })
                                .then(data => {
                                    document.getElementById('modalDiaryDate').value = info.dateStr;
                                    document.getElementById('diaryModalLabel').innerText = info.dateStr + ' 일기 작성';

                                    if (data) {
                                        document.getElementById('diaryContent').value = data.content;
                                        if (data.imagePath) {
                                            let p = data.imagePath;
                                            if (p.startsWith('/')) p = p.substring(1);
                                            document.getElementById('existingImagePreview').src = contextPath + p;
                                            document.getElementById('existingImagePreviewContainer').style.display = 'block';
                                        }
                                        btnDeleteDiary.style.display = 'block';
                                    } else {
                                        btnDeleteDiary.style.display = 'none';
                                    }
                                    new bootstrap.Modal(document.getElementById('diaryModal')).show();
                                });
                        } else {
                            alert('미래 날짜에는 일기를 작성할 수 없습니다.');
                        }
                    },
                    eventClick: function(info) {
                        if (info.event.extendedProps.type === 'todo') {
                            window.location.href = contextPath + 'todo/list';
                        }
                    },
                    eventSources: [
                        { url: contextPath + 'calendar/events', method: 'GET' },
                        {
                            url: contextPath + 'calendar/holidays',
                            method: 'GET',
                            display: 'block',
                            backgroundColor: 'transparent',
                            borderColor: 'transparent',
                            textColor: '#dc3545',
                            classNames: ['holiday-event']
                        }
                    ],
                    eventContent: function(arg) {
                        if (!arg.event.extendedProps.imagePath) {
                            var contentEl = document.createElement('div');
                            contentEl.innerHTML = arg.event.title;
                            return { domNodes: [contentEl] };
                        }
                        return { html: '' };
                    },
                    eventDidMount: function(info) {
                        const props = info.event.extendedProps;
                        if (props && props.imagePath) {
                            const dayEl = info.el.closest('.fc-daygrid-day');
                            let p = props.imagePath;
                            if (p.startsWith('/')) p = p.substring(1);
                            const finalImagePath = contextPath + p;

                            if (dayEl) {
                                dayEl.style.setProperty('background-image', 'url("' + finalImagePath + '")', 'important');
                                dayEl.style.backgroundSize = 'cover';
                                dayEl.style.backgroundPosition = 'center';
                                dayEl.style.backgroundRepeat = 'no-repeat';
                                dayEl.classList.add('diary-with-image');
                                const frame = dayEl.querySelector('.fc-daygrid-day-frame');
                                if (frame) frame.style.setProperty('background-color', 'transparent', 'important');
                                const dayTop = dayEl.querySelector('.fc-daygrid-day-top');
                                if (dayTop) {
                                    dayTop.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
                                    dayTop.style.borderRadius = '4px';
                                }
                            }
                            info.el.style.display = 'none';
                        }
                    }
                });
                calendar.render();

                var diaryModalEl = document.getElementById('diaryModal');
                diaryModalEl.addEventListener('hidden.bs.modal', function () {
                    calendar.refetchEvents();
                    document.getElementById('diaryForm').reset();
                    document.body.focus();
                });
            });
        </script>
    </div>
</body>
</html>
