<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>비밀번호 찾기</title>
</head>
<body>
    <div layout:fragment="content" class="container mt-5">
        <h2 class="mb-4">비밀번호 찾기</h2>
        
        <p class="text-muted mb-4">가입 시 등록한 아이디와 이메일을 입력하시면 임시 비밀번호를 발송해 드립니다.</p>

        <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/member/find-password}" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="id" class="form-label">아이디</label>
                <input type="text" name="id" id="id" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">이메일</label>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">임시 비밀번호 발송</button>
        </form>

        <div class="mt-3 text-end">
            <a th:href="@{/member/login}" class="me-3">로그인으로 돌아가기</a>
            <a th:href="@{/member/join}">회원가입 하러가기</a>
        </div>
    </div>
</body>
</html>
